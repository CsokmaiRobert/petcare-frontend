<div class="auth-container">
    <div class="auth-card">
        <h2>PawCare Staff Portal</h2>
        <p class="auth-subtitle">{{ isLoginMode ? 'Sign in to manage patients' : 'Create a new staff account' }}</p>

        @if (message) {
        <div class="banner" [class.error]="isError">{{ message }}</div>
        }

        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" [(ngModel)]="username" name="username" required
                    placeholder="Enter username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" required
                    placeholder="Enter password">
            </div>

            <button type="submit" class="btn-primary">
                {{ isLoginMode ? 'Sign In' : 'Register Account' }}
            </button>
        </form>

        <div class="toggle-mode">
            <button (click)="toggleMode()" class="btn-link">
                {{ isLoginMode ? "Don't have an account? Register" : 'Already have an account? Login' }}
            </button>
        </div>
    </div>
</div>
